services:
  # Aplicação Laravel
  laravel:
    image: bitnami/laravel:latest
    restart: always
    environment:
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=laravel_password
    volumes:
      - .:/app
    depends_on:
      - db

  # Servidor Web (Nginx)
  web:
    image: nginx:stable-alpine
    container_name: laravel_web
    restart: always
    depends_on:
      - laravel
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  # Banco de Dados (MySQL)
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    volumes:
      - db_data:/var/lib/mysql

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    depends_on:
      - db
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - UPLOAD_LIMIT=64M # Opcional: aumenta o limite de upload de SQL
    # No Dokploy, você mapeará o domínio/porta para este serviço na interface.

volumes:
  db_data: