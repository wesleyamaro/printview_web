services:
  # Aplicação Laravel
  laravel:
    image: bitnami/laravel:latest
    restart: always
    environment:
      - APP_KEY=base64:$(openssl rand -base64 32)
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=printview_db
      - DB_USERNAME=dokploy
      - DB_PASSWORD=password
    volumes:
      - .:/app
    depends_on:
      - mariadb

  # Banco de Dados
  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_DATABASE=printview_db
      - MARIADB_USER=dokploy
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=root_password
    volumes:
      - mariadb_data:/var/lib/mysql

  # Gerenciador do Banco
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      - PMA_HOST=mariadb
      - MYSQL_ROOT_PASSWORD=root_password
    depends_on:
      - mariadb

volumes:
  mariadb_data: