services:
    healthcheck:
  laravel:
    image: bitnami/laravel:latest
    restart: always
    environment:
      - APP_KEY=base64:$(openssl rand -base64 32)
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    # Removi o docker.sock daqui para evitar o erro de sintaxe
    volumes:
      - .:/app
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_DATABASE=laravel
      - MARIADB_USER=dokploy
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=root_password
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: