services:
  # Aplicação Laravel
  laravel:
    image: bitnami/laravel:latest
    restart: always
    environment:
      - APP_KEY=base64:$(openssl rand -base64 32)
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=printview_db
      - DB_USERNAME=dokploy
      - DB_PASSWORD=password
    volumes:
      - .:/app
    depends_on:
      - mariadb

  web:
    image: nginx:stable-alpine
    container_name: laravel_web
    depends_on:
      - app
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    # Removi os labels do Traefik: você vai configurar o domínio na interface do Dokploy

  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: