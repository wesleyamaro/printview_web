services:
  # 1. PHP-FPM (Processa o código PHP)
  app:
    image: bitnami/laravel:latest
    container_name: laravel_app
    restart: always
    environment:
      - DB_HOST=mariadb
      - DB_DATABASE=laravel
      - DB_USERNAME=dokploy
      - DB_PASSWORD=password
    volumes:
      - .:/app
    depends_on:
      - mariadb

  # 2. NGINX (Servidor Web que entrega os arquivos)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      # Nota: Você precisará de um arquivo nginx.conf no seu Git
      # ou mapear um volume de configuração aqui.
    depends_on:
      - app

  # 3. Banco de Dados
  mariadb:
    image: mariadb:10.11
    container_name: laravel_db
    restart: always
    environment:
      - MARIADB_DATABASE=laravel
      - MARIADB_USER=dokploy
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=root_password
    volumes:
      - mariadb_data:/var/lib/mysql

  # 4. phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      - PMA_HOST=mariadb
    depends_on:
      - mariadb

volumes:
  mariadb_data: