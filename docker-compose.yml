services:
  # Aplicação Laravel
  laravel:
    image: bitnami/laravel:latest
    restart: always
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=dokploy
      - DB_PASSWORD=password
    depends_on:
      - mariadb

  # Banco de Dados
  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_DATABASE=laravel
      - MARIADB_USER=dokploy
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=root_password
    volumes:
      - mariadb_data:/var/lib/mysql

  # phpMyAdmin para gerenciar o banco via browser
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mariadb
      - PMA_ARBITRARY=1
      - MYSQL_ROOT_PASSWORD=root_password
    depends_on:
      - mariadb

volumes:
  mariadb_data: